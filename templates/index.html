<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Dynamic Car Price Prediction</title>
<style>
  *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{

      background:
       linear-gradient(rgba(5,10,30,0.92),
       rgba(5,15,40,0.95)),
       url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1600');

      background-size:cover;
      background-position:center;
      background-attachment:fixed;

      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:25px;
      color:white;
    }

    .main-container{

      width:1450px;
      min-height:950px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(16px);
      border-radius:28px;
      overflow:hidden;
      box-shadow:0 20px 50px rgba(0,0,0,0.7);

    }

    /* HEADER */

    .top-header{

      text-align:center;
      padding:25px;
      background:rgba(255,255,255,0.05);
      border-bottom:1px solid rgba(255,255,255,0.1);

    }

    .top-header img{
    width:320px;
    height:120px;

    object-fit:contain;

    background:white;

    padding:10px;

    border-radius:15px;

    border:4px solid white;

    margin-bottom:15px;

    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

    .top-header h1{

      font-size:42px;
      color:#ffd369;
      letter-spacing:3px;
      text-shadow:2px 2px 10px black;

    }

    /* CONTENT */

    .content{

      display:flex;

    }

    /* LEFT SIDE */

    .left-section{

      width:350px;
      background:rgba(0,0,0,0.35);
      padding:40px 25px;
      text-align:center;
      border-right:1px solid rgba(255,255,255,0.1);

    }

    .left-section img{

      width:220px;
      height:250px;
      border-radius:20px;
      object-fit:cover;
      border:4px solid white;
      margin-bottom:25px;
      box-shadow:0 10px 30px rgba(0,0,0,0.6);

    }

    .left-section h2{

      font-size:30px;
      margin-bottom:12px;

    }

    .designation{

      color:#00ffcc;
      font-size:20px;
      margin-bottom:10px;
      font-weight:bold;

    }

    .designation2{

      color:#ffd369;
      font-size:18px;
      margin-bottom:25px;
      font-weight:bold;

    }

    .email{

      font-size:18px;
      background:rgba(255,255,255,0.08);
      padding:12px;
      border-radius:10px;

    }

    /* CENTER SECTION */

    .center-section{

      flex:1;
      padding:40px;

    }

    .form-box{

      background:rgba(255,255,255,0.06);
      border-radius:20px;
      padding:35px;

    }

    .form-box h2{

      text-align:center;
      font-size:40px;
      margin-bottom:35px;

    }

    .input-grid{

      display:grid;
      grid-template-columns:1fr 1fr;
      gap:22px;

    }

    .input-group label{

      display:block;
      margin-bottom:8px;
      font-size:17px;
      font-weight:bold;

    }

    .input-group input,
    .input-group select{

      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      font-size:16px;
      outline:none;
      background:rgba(255,255,255,0.92);

    }

    button{

      width:100%;
      padding:18px;
      margin-top:35px;
      border:none;
      border-radius:14px;
      font-size:22px;
      font-weight:bold;
      cursor:pointer;
      background:linear-gradient(to right,#ffd369,#ffb703);
      transition:0.4s;

    }

    button:hover{

      transform:scale(1.02);
      background:orangered;

    }

    /* RESULT */

    .result-box{

      margin-top:40px;
      text-align:center;
      display:none;
      animation:fadeIn 1s ease;

    }

    .result-box img{

      width:100%;
      max-width:560px;
      height:320px;
      object-fit:cover;
      border-radius:20px;
      margin-bottom:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.6);

    }

    .car-name{

      font-size:38px;
      font-weight:bold;
      margin-bottom:12px;

    }

    .car-price{

      font-size:45px;
      color:#00ffb3;
      font-weight:bold;
      margin-bottom:15px;

    }

    .extra-details{

      font-size:20px;
      color:#ffd369;
      font-weight:bold;
      margin-top:10px;

    }

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    @media(max-width:1100px){

      .content{
        flex-direction:column;
      }

      .left-section{
        width:100%;
      }

      .input-grid{
        grid-template-columns:1fr;
      }

    }

    </style>


</head>

<body>

  <div class="main-container">

    <!-- HEADER -->

    <div class="top-header">

      <!-- COMPANY LOGO -->

      <!-- KEEP YOUR COMPANY PHOTO INSIDE static FOLDER -->

      <!-- Example:
      static/companylogo.png
      -->

      <img src="static/vihara_logo.jpeg"
      alt="vihara_logo.jpeg">

      <h1>VIHARA TECH PVT LIMITED</h1>

    </div>

    <div class="content">

      <!-- LEFT SIDE -->

      <div class="left-section">

        <!-- YOUR PHOTO -->

        <!-- KEEP YOUR PHOTO INSIDE static FOLDER -->

        <!-- Example:
        static/myphoto.jpg
        -->

        <img src="static/narendra.jpg"
        alt="narendra.jpg">

        <h2>Muthireddy Narendra</h2>

        <div class="designation">

          Data Analyst and ML Engineer

        </div>

        <div class="email">

          📧 muthireddynarendragmail.com

        </div>

      </div>

      <!-- CENTER SECTION -->

      <div class="center-section">

        <div class="form-box">

          <h2>Dynamic Car Price Prediction</h2>

          <div class="input-grid">

            <!-- BRAND -->

            <div class="input-group">

              <label>Brand</label>

               <select id="brand">
    <option value="">Select Brand</option>

    <option>Toyota</option>
    <option>BMW</option>
    <option>Audi</option>
    <option>Honda</option>
    <option>Mercedes</option>
    <option>Tesla</option>
    <option>Ford</option>
</select>

            </div>

            <!-- SERIES -->

            <div class="input-group">

              <label>Series</label>

              <select id="series">
                <option value="">Select Series</option>
                <option>Standard</option>
                <option>X Series</option>
                <option>S Series</option> <option>M Series</option>
                <option>Sport Series</option>
                <option>Luxury Series</option>
                <option>Electric Series</option>
              </select>

            </div>

            <!-- CONDITION -->

            <div class="input-group">

              <label>Condition</label>

              <select id="condition">

                <option value="">Select Condition</option>

                <option>New</option>
                <option>Old</option>

              </select>

            </div>

            <!-- MILEAGE -->

            <div class="input-group">

              <label>Mileage (KM)</label>

              <input type="number"
              id="mileage"
              placeholder="Enter Mileage">

            </div>

            <!-- YEAR -->

            <div class="input-group">

              <label>Year</label>

              <input type="number"
              id="year"
              placeholder="Enter Year">

            </div>

            <!-- ENGINE -->

            <div class="input-group">

              <label>Engine Size (CC)</label>

              <input type="number"
              id="engine"
              placeholder="Enter Engine Size">

            </div>

            <!-- FUEL -->

            <div class="input-group">

              <label>Fuel Type</label>

              <select id="fuel">

                <option value="">Select Fuel Type</option>

                <option>Petrol</option>
                <option>Diesel</option>
                <option>Electric</option>
                <option>Hybrid</option>

              </select>

            </div>

            <!-- TRANSMISSION -->

            <div class="input-group">

              <label>Transmission</label>

              <select id="transmission">

                <option value="">Select Transmission</option>

                <option>Automatic</option>
                <option>Manual</option>

              </select>

            </div>

          </div>

          <!-- BUTTON -->

          <button onclick="showCarDetails()">

            Predict Price

          </button>

          <!-- RESULT -->

          <div class="result-box" id="resultBox">

            <img id="carImage" src="">

            <div class="car-name" id="carName"></div>

            <div class="car-price" id="carPrice"></div>

            <div class="extra-details"
            id="extraDetails"></div>

          </div>

        </div>

      </div>

    </div>

  </div>

  <script>

    function showCarDetails(){

      let brand =
      document.getElementById("brand").value;

      let series =
      document.getElementById("series").value;

      let condition =
      document.getElementById("condition").value;

      let mileage =
      parseInt(document.getElementById("mileage").value) || 0;

      let year =
      parseInt(document.getElementById("year").value) || 2020;

      let engine =
      parseInt(document.getElementById("engine").value) || 1000;

      let fuel =
      document.getElementById("fuel").value;

      let transmission =
      document.getElementById("transmission").value;

      let resultBox =
      document.getElementById("resultBox");

      let image =
      document.getElementById("carImage");

      let name =
      document.getElementById("carName");

      let priceText =
      document.getElementById("carPrice");

      let extra =
      document.getElementById("extraDetails");

      if(brand === ""){

        alert("Please Select Brand");

        return;

      }

      resultBox.style.display = "block";

      /* BASE PRICES */

      const basePrices = {
    Toyota: 85000,
    BMW: 450000,
    Audi: 520000,
    Honda: 100000,
    Mercedes: 650000,
    Tesla: 750000,
    Ford: 200000
};

      /* CAR IMAGES */

      const carImages = {
    Toyota: "static/toyota.jpg",

    BMW: "static/bmw.jpg",

    Audi: "static/audi.jpg",

    Honda: "static/honda.jpg",

    Mercedes: "static/mercedies.jpg",

    Tesla: "static/tesla.jpg",

    Ford: "static/ford.jpg"
};

      let finalPrice = basePrices[brand];

      /* YEAR */

      if(year >= 2024){

        finalPrice += 500000;

      }

      else if(year <= 2018){

        finalPrice -= 300000;

      }

      /* CONDITION */

      if(condition === "New"){

        finalPrice += 400000;

      }

      else{

        finalPrice -= 250000;

      }

      /* ENGINE */

      if(engine > 2000){

        finalPrice += 300000;

      }

      else if(engine < 1200){

        finalPrice -= 100000;

      }

      /* MILEAGE */

      if(mileage > 80000){

        finalPrice -= 200000;

      }

      else if(mileage < 20000){

        finalPrice += 150000;

      }

      /* SERIES */

      if(series === "Luxury Series"){

        finalPrice += 500000;

      }

      else if(series === "Sport Series"){

        finalPrice += 350000;

      }

      else if(series === "Electric Series"){

        finalPrice += 450000;

      }

      /* FUEL */

      if(fuel === "Electric"){

        finalPrice += 400000;

      }

      else if(fuel === "Hybrid"){

        finalPrice += 250000;

      }

      /* TRANSMISSION */

      if(transmission === "Automatic"){

        finalPrice += 150000;

      }

      /* SHOW RESULT */

      image.src = carImages[brand];

      name.innerHTML =
      brand + " " + series;

      priceText.innerHTML =
      "₹ " +
      finalPrice.toLocaleString('en-IN');

      extra.innerHTML =

      "Condition : " + condition +

      " | Fuel : " + fuel +

      " | Transmission : " + transmission;

    }

  </script>

</body>

</html>
